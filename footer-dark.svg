<svg xmlns="http://www.w3.org/2000/svg" width="900" height="80" viewBox="0 0 900 80">
  <style>
    @keyframes twinkle-a { 0%,100%{opacity:0.9} 50%{opacity:0.3} }
    @keyframes twinkle-b { 0%,100%{opacity:0.5} 50%{opacity:1.0} }
    @keyframes twinkle-c { 0%,100%{opacity:0.7} 50%{opacity:0.2} }
    @keyframes twinkle-d { 0%,100%{opacity:0.4} 50%{opacity:0.9} }
    .s-a { animation: twinkle-a 3.1s ease-in-out infinite; }
    .s-b { animation: twinkle-b 2.4s ease-in-out infinite; }
    .s-c { animation: twinkle-c 4.0s ease-in-out infinite; }
    .s-d { animation: twinkle-d 2.8s ease-in-out infinite; }
    .s-e { animation: twinkle-a 3.7s ease-in-out infinite 0.5s; }
    .s-f { animation: twinkle-b 2.2s ease-in-out infinite 1.1s; }
    .s-g { animation: twinkle-c 3.4s ease-in-out infinite 0.3s; }
  </style>
  <rect width="900" height="80" fill="#1a1a1a"/>
