    <line x1="625" y1="60" x2="700" y2="20"/>
    <line x1="700" y1="20" x2="775" y2="50"/>
    <line x1="775" y1="50" x2="858" y2="18"/>
    <line x1="95"  y1="25" x2="245" y2="18"/>
    <line x1="320" y1="45" x2="475" y2="58"/>
    <line x1="548" y1="30" x2="700" y2="20"/>
    <line x1="625" y1="60" x2="775" y2="50"/>
  </g>
  <g fill="#c9ff32">
