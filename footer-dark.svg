    <circle class="s-f" cx="548" cy="30" r="2"/>
    <circle class="s-c" cx="625" cy="60" r="1.5"/>
    <circle class="s-d" cx="700" cy="20" r="2.5"/>
    <circle class="s-g" cx="775" cy="50" r="1.5"/>
